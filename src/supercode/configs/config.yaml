---
# general
verbose: 10 # how much info is printed: 0=none, 1=little, 2=lots, 3=all

# chat model
model:
    ID: # model ID from HuggingFace, size for Qwen: 32B, 14B, 7B, 3B, 1.5B, 0.5B,
        # file size (for 1.5B) is: GPTQ-Int4 (1.16 GB) ~ AWQ (1.63 GB) < full (3.1 GB) < GGUF (9.76 GB)
        #Qwen/Qwen3-Coder-Next # MoE, 3B active and 80B total
        #Qwen/Qwen2.5-Coder-1.5B-Instruct-GGUF
        Qwen/Qwen2.5-Coder-3B-Instruct
        #Qwen/Qwen2.5-Coder-1.5B-Instruct-AWQ
        #Qwen/Qwen2.5-Coder-1.5B-Instruct-GPTQ-Int4
    raw_model: true # True if the model is loaded directly, False if loaded through pipeline
    quant_type: full # valid values: ("full", "AWQ", "GPTQ", "bits") --> check file formats!!!
    temperature: 0.2 # 0 = always select the most likely word, 1 = random
    max_new_tokens: 500 # max number of tokens that can be generated

    # NOTE: the model can be loaded as quantized only if someone published the quantized version (see file's extensions):
    #       --> full precision: model.safetensors                 (direct load)
    #       --> full precision: pytorch_model.bin.index.json      (direct load, NOT with Transformers!)
    #       --> 4bit quantized: model-4bit.safetensors            (needs bitsandbytes)
    #       --> GPTQ quantized: gptq_model-4bit-128g.safetensors  (direct load)
    #       --> GGUF quantized: model.gguf                        (direct load, NOT with Transformers!)

# embedding model for building the database (for RAG)
emb_model: sentence-transformers/msmarco-bert-base-dot-v5  # model ID from HuggingFace

# tools (AGENT)
tools_dir: tools-outputs # where I save the results from the agent's tools
gen_code_dir: supercode/docker_env/results # where I save the code generated by the agent, so it can be tested

# database (RAG)
chunk_size: 1000
chunk_overlap: 200

docs_dir:  RAG-codebase # where I save the files for RAG
db_dir:    supercode/code-db  # where I save the vector database (db) for RAG
update_db: false # if I want to update the db (for example because I changed some files)
