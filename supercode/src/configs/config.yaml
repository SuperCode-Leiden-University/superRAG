---
# general
verbose: 1 # how much info is printed: 0=none, 1=little, 2=lots, 3=all

# chat model
model:
    model_id: # model ID from HuggingFace, size for Qwen: 32B, 14B, 7B, 3B, 1.5B, 0.5B,
        # file size (for 1.5B) is: GPTQ-Int4 (1.16 GB) ~ AWQ (1.63 GB) < full (3.1 GB) < GGUF (9.76 GB)
        #Qwen/Qwen3-Coder-Next # MoE, 3B active and 80B total
        #Qwen/Qwen2.5-Coder-1.5B-Instruct-GGUF
        #Qwen/Qwen2.5-Coder-3B-Instruct
        Qwen/Qwen3-4B
        #Qwen/Qwen2.5-Coder-1.5B-Instruct-AWQ
        #Qwen/Qwen2.5-Coder-1.5B-Instruct-GPTQ-Int4
    raw_model: true # True if the model is loaded directly, False if loaded through pipeline
    quant_type: full # valid values: ("full", "sinq", "AWQ", "GPTQ", "bits") --> check file formats!!!
    gen_args:
        temperature: 0.4 # 0 = always select the most likely word, 1 = random
        max_new_tokens: 4000 # max number of tokens that can be generated
        presence_penalty: 0.2 # positive values penalize repeating sentences and words (range [-2,+2], advisable to keep in [-1,+1] for good performances)
        frequency_penalty: 0.2 # high to avoid repetition of specific words (presence is more about having new topics)
        # Reminder that code from LLMs has been shown to be more repetitive than human's, so it makes sense to penalize it a bit!

    # NOTE: the model can be loaded as quantized only if someone published the quantized version (see file's extensions):
    # --> full precision, based on:
    #     - model.safetensors
    #     - pytorch_model.bin.index.json (NOT compatible with Transformers!)
    # --> on-the-fly quantization, based on:
    #     - model-4bit.safetensors (needs bitsandbytes, sinq, HQQ or torchao)
    # --> calibration-based quantization (direct load), based on:
    #     - model.safetensors (AWQ)
    #     - gptq_model-4bit-128g.safetensors
    #     - model.gguf (NOT compatible with Transformers!)


# thinking model for planning/debugging (good at extrapolating logic issues)
thinking_model:
    model_id: # model ID from HuggingFace
        #Qwen/Qwen3.5-4B # includes thinking mode by default (DOESN'T WORK???)
        Qwen/Qwen3-4B # includes thinking mode by default
        #Qwen/Qwen3-4B-Thinking-2507
    raw_model: true # True if the model is loaded directly, False if loaded through pipeline
    quant_type: full # valid values: ("full", "sinq", "AWQ", "GPTQ", "bits") --> check file formats!!!
    gen_args:
        temperature: 0.4 # 0 = always select the most likely word, 1 = random
        max_new_tokens: 1500 # max number of tokens that can be generated
        presence_penalty: 1.0 # positive values penalize repeating sentences and words (range [-2,+2], advisable to keep in [-1,+1] for good performances)
        frequency_penalty: 0.2 # high to avoid repetition of specific words (presence is more about having new topics)

# embedding model for building the database (for RAG)
emb_model_id: sentence-transformers/msmarco-bert-base-dot-v5  # model ID from HuggingFace

# folders
tools_dir:     tools-outputs # where I save the results from the agent's tools
docs_dir:      RAG-codebase # where I save the files for RAG
db_dir:        src/database/code-db  # where I save the vector database (db) for RAG
docker_dir:    src/docker_env # where I save the dockerfile and docker_compose.yml
gen_code_dir:  src/docker_env/results # where I mount with the docker container
gen_code_file: src/docker_env/results/gen_code/gen_code_temp.py # where I save the temp file for generating code

# database (RAG)
chunk_size: 1000
chunk_overlap: 200
update_db: false # if I want to update the db (for example because I changed some files)
